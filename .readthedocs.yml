# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2/

version: 2

# Build documentation in the docs/api directory with Sphinx
build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/api/conf.py
  fail_on_warning: false

python:
  version: 3.12
  install:
    - method: pip
      path: .
