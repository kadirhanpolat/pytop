name: Publish to PyPI

# Builds the sdist + wheel, validates them, and publishes via PyPI
# Trusted Publishing (OIDC) — no API tokens are stored in the repository.
#
# Triggers:
#   * push of a v* tag (e.g. v1.7.0)  -> build + publish to PyPI (production)
#   * manual workflow_dispatch        -> build + publish to TestPyPI (dry run)
#
# One-time setup on PyPI / TestPyPI (Account -> Publishing -> Add a new pending
# publisher), matching exactly:
#   PyPI project name : pytop
#   Owner             : kadirhanpolat
#   Repository        : pytop
#   Workflow filename : publish.yml
#   Environment name  : pypi   (and testpypi for the TestPyPI publisher)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Verify version matches the tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG_VERSION=${GITHUB_REF_NAME#v}
          echo "pyproject version: $PKG_VERSION   tag: $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::pyproject.toml version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI (dry run)
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/pytop
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pytop
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
