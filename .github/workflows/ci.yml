name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/pytop/

      - name: Type-check with mypy
        run: mypy src/pytop/

      - name: Run tests with coverage
        run: pytest tests/ --cov=pytop --cov-report=term-missing -q

      # Issue #9: execute docstring >>> examples. Runs on the deterministic
      # subset of src/pytop. _internal/ is dev-only tooling (excluded like ruff/
      # mypy). The listed modules are skipped because their doctests print a
      # set/dict/frozenset whose repr order is not stable enough for a literal
      # doctest match (a future good-first-issue can make those examples
      # deterministic and drop the exclusion).
      - name: Run docstring doctests
        run: |
          pytest --doctest-modules src/pytop -q \
            --ignore=src/pytop/_internal \
            --ignore=src/pytop/relations.py \
            --ignore=src/pytop/sets.py \
            --ignore=src/pytop/predicate_relations.py \
            --ignore=src/pytop/predicate_functions.py \
            --ignore=src/pytop/random_generators.py \
            --ignore=src/pytop/covering_spaces.py \
            --ignore=src/pytop/degree_theory.py \
            --ignore=src/pytop/higher_categories.py \
            --ignore=src/pytop/nerve_complex.py \
            --ignore=src/pytop/shape_theory.py \
            --ignore=src/pytop/topological_field_theory.py
